<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)" />

  <!-- Subtle inner glow border -->
  <rect width="64" height="64" rx="14" ry="14" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.4"/>

  <!-- Camera / snap shape: stylized lens ring -->
  <circle cx="32" cy="30" r="13" fill="none" stroke="url(#sparkGrad)" stroke-width="2.5" opacity="0.9"/>
  <circle cx="32" cy="30" r="8.5" fill="#EDE9FE" opacity="0.15"/>
  <circle cx="32" cy="30" r="5.5" fill="#EDE9FE" opacity="0.25"/>

  <!-- AI spark — 4-point star -->
  <g filter="url(#glow)" fill="url(#sparkGrad)">
    <!-- Main 4-point star centered in lens -->
    <path d="M32 23.5 L33.3 28.7 L38.5 30 L33.3 31.3 L32 36.5 L30.7 31.3 L25.5 30 L30.7 28.7 Z"/>
  </g>

  <!-- Small sparkle top-right corner -->
  <g fill="#EDE9FE" opacity="0.85" filter="url(#glow)">
    <path d="M47 15 L47.8 17.2 L50 18 L47.8 18.8 L47 21 L46.2 18.8 L44 18 L46.2 17.2 Z" />
  </g>

  <!-- Tiny dot sparkle bottom-left -->
  <circle cx="17" cy="46" r="1.5" fill="#C4B5FD" opacity="0.7"/>

  <!-- "S" letterform - subtle, bottom center -->
  <text x="32" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="7" font-weight="700" fill="#EDE9FE" opacity="0.75" letter-spacing="0.5">SNAP</text>
</svg>
